name: Cyber Analyzer

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false  # Important: disable wrapper to get raw outputs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run Deployment Script
        id: deploy_step # Added an ID here to capture outputs later
        run: |
          export GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          export DEFAULT_GCP_REGION=${{ secrets.DEFAULT_GCP_REGION }}
          
          chmod +x scripts/gcp/deploy.sh
          # Run the script. It now handles the 'init' with the correct prefix.
          ./scripts/gcp/deploy.sh ${{ github.event.inputs.environment || 'dev' }}
          
      - name: Get Deployment URLs
        id: deploy_outputs
        # Change: Move into the directory where the state was initialized
        working-directory: ./terraform/gcp
        run: |
          terraform init -input=false \
            -backend-config="bucket=cyber-analyzer-tfstate" \
            -backend-config="prefix=${{ github.event.inputs.environment || 'dev' }}"

          echo "service_url=$(terraform output -raw service_url)" >> $GITHUB_OUTPUT

      - name: Deployment Summary
        run: |
          echo "✅ Deployment Complete!"
          echo "🌐 App URL: ${{ steps.deploy_outputs.outputs.service_url }}"